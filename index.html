<!doctype html>
<html lang="es">
    <head>
        <meta charset='utf-8'>
        <title>Zombie Survivor</title>
        <style>
            body {
                background-color: #000;
                margin: 0px;
                overflow: hidden;
                font-family: 'Impact', 'Arial Black', sans-serif; 
            }

            #start-screen {
                position: fixed; inset: 0; 
                background: radial-gradient(circle, #1a2a1a 0%, #000000 100%);
                display: none;
                flex-direction: column; align-items: center; justify-content: center;
                z-index: 100; color: #fff;
            }
            #start-screen h1 {
                font-size: 85px; letter-spacing: 8px; color: #39ff14;
                text-shadow: 0 0 30px rgba(57, 255, 20, 0.6), 4px 4px 0px #000; 
                margin-bottom: 10px; text-transform: uppercase;
                transform: skewX(-5deg);
            }
            #start-screen p {
                color: #aaa; font-size: 18px; font-family: 'Courier New', monospace;
                margin-bottom: 40px; letter-spacing: 2px;
            }
            .instructions {
                background: rgba(0, 0, 0, 0.7);
                color: #ddd; font-size: 15px; line-height: 1.8; font-family: 'Courier New', monospace;
                text-align: center; margin-bottom: 40px;
                border-left: 4px solid #39ff14; border-right: 4px solid #39ff14;
                padding: 20px 40px; box-shadow: 0 0 15px rgba(57,255,20,0.1) inset;
            }
            .accent { color: #39ff14; font-weight: bold; font-size: 18px; }
            
            #start-btn {
                background: #111; border: 3px solid #39ff14; color: #39ff14;
                padding: 15px 60px; font-size: 24px; letter-spacing: 2px;
                cursor: pointer; font-family: 'Impact', sans-serif; 
                transition: all 0.2s; transform: skewX(-10deg);
            }
            #start-btn:hover {
                background: #39ff14; color: #000; box-shadow: 0 0 20px #39ff14;
                transform: skewX(-10deg) scale(1.05);
            }

            #win-screen, #lose-screen {
                position: fixed; inset: 0; display: none;
                flex-direction: column; align-items: center; justify-content: center;
                z-index: 200; text-align: center;
            }
            #win-screen { background: rgba(10, 30, 10, 0.95); }
            #lose-screen { background: rgba(30, 0, 0, 0.95); }
            
            #win-screen h1 { color: #ffd700; font-size: 70px; letter-spacing: 5px; text-shadow: 0 0 30px #ffd700; margin-bottom: 10px; }
            #lose-screen h1 { color: #ff0000; font-size: 80px; letter-spacing: 5px; text-shadow: 0 0 30px #ff0000; margin-bottom: 10px; }
            
            .end-msg { color: #fff; margin-top: 10px; font-size: 20px; font-family: 'Courier New', monospace; }
            .score-msg { color: #39ff14; font-size: 24px; margin-top: 15px; text-transform: uppercase; }
            
            .restart-btn {
                margin-top: 40px; background: transparent; border: 3px solid currentColor;
                padding: 15px 50px; font-size: 20px; letter-spacing: 2px;
                cursor: pointer; font-family: 'Impact', sans-serif; transition: all 0.2s;
                transform: skewX(-10deg);
            }
            #win-screen .restart-btn { color: #ffd700; }
            #win-screen .restart-btn:hover { background: #ffd700; color: #000; }
            #lose-screen .restart-btn { color: #ff0000; }
            #lose-screen .restart-btn:hover { background: #ff0000; color: #fff; }
        </style>
    </head>
    <body>
        <div id="container"></div>

        <div id="start-screen">
            <h1>Zombie Survivor</h1>
            <div class="instructions">
                <span class="accent">CONTROLES</span><br>
                WASD / Flechas — Moverse<br>
                Shift — Correr<br>
                Espacio — Atacar<br><br>
                <span class="accent">OBJETIVO</span><br>
                Sobrevive <strong>1 Minuto</strong> eliminando tantos zombies como puedas.
            </div>
            <button id="start-btn">INICIAR</button>
        </div>

        <div id="win-screen">
            <h1>VICTORIA</h1>
            <p class="end-msg">Has sobrevivido los 60 segundos.</p>
            <p class="score-msg" id="final-score">Zombis Eliminados: 0</p>
            <button class="restart-btn" onclick="location.reload()">JUGAR DE NUEVO</button>
        </div>

        <div id="lose-screen">
            <h1>HAS MUERTO</h1>
            <p class="end-msg">La horda te ha devorado...</p>
            <button class="restart-btn" onclick="location.reload()">REINTENTAR</button>
        </div>

        <script src="./lib/three.min_r140.js"></script>
        <script src="./lib/OrbitControls.js"></script>
        <script src="./lib/GLTFLoader.js"></script>
        <script src="./lib/inflate.min.js"></script>
        <script src="./lib/FBXLoader.js"></script>
        <script src="./lib/stats.min.js"></script>
        <script src="./lib/dat.gui.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/utils/SkeletonUtils.js"></script>

        <script src="./js/Proyecto.js"></script>
    </body>
</html>
